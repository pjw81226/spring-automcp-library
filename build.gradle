plugins {
    id 'java'
    id 'org.springframework.boot' version '3.4.4'
    id 'io.spring.dependency-management' version '1.1.7'
}

group = 'com.example'
version = '0.0.1-SNAPSHOT'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }
}

repositories {
    mavenCentral()
    maven { url 'https://jitpack.io' }
}

dependencies {
    implementation 'org.springframework.boot:spring-boot-starter-web'
    implementation 'org.springframework.boot:spring-boot-starter-jdbc'

    // H2 in-memory database (for demo purposes)
    runtimeOnly 'com.h2database:h2'

    // Spring MCP Starter
    implementation 'com.github.pjw81226:spring-mcp-starter:v0.0.1'

    // MCP SDK (Jackson 3) requires jackson-annotations 2.20+
    // Spring Boot BOM forces 2.18.x which causes NoSuchFieldError: POJO
    implementation 'com.fasterxml.jackson.core:jackson-annotations:2.20'
}
